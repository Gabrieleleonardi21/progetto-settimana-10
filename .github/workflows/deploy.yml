name: Deploy su GitHub Pages

on:
  # Pubblica a ogni push su main
  push:
    branches: [main]
  # Permette di lanciarlo a mano dalla tab Actions
  workflow_dispatch:

# Permessi richiesti da actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un deploy alla volta: se ne parte un altro, il precedente viene annullato
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ci e non install: usa esattamente le versioni di package-lock.json
      - run: npm ci

      # build genera dist/, postbuild ci copia dentro 404.html
      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
